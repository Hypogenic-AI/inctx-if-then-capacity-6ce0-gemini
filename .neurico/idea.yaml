idea:
  title: In-context If-Then Capacity
  domain: nlp
  hypothesis: 'The ability of large language models to follow conditional (if-then)
    instructions in context is inconsistent across different types of instructions;
    this capacity can be measured and analyzed for consistency and reliability.

    '
  background:
    description: 'LLMs have gotten pretty good at instruction following. However,
      I have noticed that if I set certain instructions to trigger conditionally (make
      sure that every time you mention a dog you also mention a cat in this story)
      they often misfire (both false positives and false negatives). Is the models
      ability to follow instructions conditionally somewhat consistent over different
      kinds of instructions? If so, can we measure its capacity to follow such instructions?

      '
